<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LagoBeat | Casa Vacanze sul Lago</title>

<meta name="description" content="LagoBeat casa vacanze sul lago. Relax, natura, sport acquatici e trekking. Verifica disponibilità e richiedi informazioni.">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f6f9ff;
color:#333;
}

header{
height:80vh;
background:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

header h1{
font-size:50px;
background:rgba(0,0,0,0.45);
padding:25px 40px;
border-radius:12px;
}

section{
padding:70px 20px;
max-width:1100px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:40px;
}

/* gallery */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:12px;
}

/* attività */

.attivita{
background:linear-gradient(135deg,#eaf6ff,#d6ecff,#c1e3ff);
border-radius:20px;
padding:40px;
text-align:center;
font-size:18px;
}

/* booking */

.booking-box{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
max-width:600px;
margin:auto;
}

.booking-box input,
.booking-box select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
}

.booking-box button{
width:100%;
background:#1da1f2;
color:white;
border:none;
padding:15px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.price{
text-align:center;
font-size:22px;
margin-top:15px;
font-weight:bold;
}

/* whatsapp */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
text-decoration:none;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

/* footer */

footer{
background:#0a2540;
color:white;
text-align:center;
padding:40px;
margin-top:50px;
}

</style>

</head>

<body>

<header>
<h1>LagoBeat Relax sul Lago</h1>
</header>

<section>

<h2>La Struttura</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">

<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">

<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">

</div>

</section>

<section class="attivita">

<h2>Attività</h2>

<p>
Kayak • Trekking • Mountain Bike • Escursioni • Relax sul Lago
</p>

</section>

<section>

<h2>Verifica disponibilità</h2>

<div class="booking-box">

<input id="arrivo" placeholder="Data arrivo">

<input id="partenza" placeholder="Data partenza">

<select id="ospiti">
<option>Numero ospiti</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5+</option>
</select>

<div class="price" id="prezzo">
Prezzo totale: —
</div>

<button onclick="prenota()">
Richiedi disponibilità
</button>

</div>

</section>

<section>

<h2>Dove siamo</h2>

<iframe
src="https://maps.google.com/maps?q=lago%20di%20garda&t=&z=11&ie=UTF8&iwloc=&output=embed"
width="100%"
height="400"
style="border:0;border-radius:12px">
</iframe>

</section>

<footer>

<p>© LagoBeat Casa Vacanze</p>

</footer>

<a class="whatsapp" href="https://wa.me/393000000000">💬</a>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>

flatpickr("#arrivo",{dateFormat:"Y-m-d"});
flatpickr("#partenza",{dateFormat:"Y-m-d"});

const prezzoNotte = 120;

document.querySelectorAll("#arrivo,#partenza")
.forEach(el => el.addEventListener("change",calcola));

function calcola(){

let arrivo = new Date(document.getElementById("arrivo").value);
let partenza = new Date(document.getElementById("partenza").value);

if(arrivo && partenza){

let giorni = (partenza-arrivo)/(1000*60*60*24);

if(giorni>0){

let prezzo = giorni * prezzoNotte;

document.getElementById("prezzo")
.innerHTML = "Prezzo totale: €"+prezzo;

}

}

}

function prenota(){

let arrivo = document.getElementById("arrivo").value;
let partenza = document.getElementById("partenza").value;
let ospiti = document.getElementById("ospiti").value;

let messaggio =
`Richiesta disponibilità LagoBeat

Arrivo: ${arrivo}
Partenza: ${partenza}
Ospiti: ${ospiti}`;

let url =
"https://wa.me/393000000000?text="+encodeURIComponent(messaggio);

window.open(url,"_blank");

}

</script>

</body>

</html>
